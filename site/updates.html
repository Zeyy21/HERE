  <script>
    // Renders updates from /content/updates.json so the Decap CMS admin
    // can edit them without touching markup.
    (function () {
      const TILT = ['tilt-r', 'tilt-l'];
      const DELAYS = ['delay-1','delay-2','delay-3','delay-4'];

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
      }
      // very small markdown-ish: **bold** + literal newlines
      function inlineFormat(s) {
        return escapeHtml(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      }
      function fmtDate(iso) {
        try {
          const d = new Date(iso);
          if (isNaN(d)) return iso;
          return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
        } catch { return iso; }
      }

      async function loadUpdates() {
        const container = document.getElementById('updatesTimeline');
        try {
          const res = await fetch('content/updates.json?t=' + Date.now(), { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          const list = (data && Array.isArray(data.updates)) ? data.updates : [];
          if (!list.length) {
            container.innerHTML = '<p class="muted text-center" style="padding: 30px 0;">No patch notes yet.</p>';
            return;
          }
          container.innerHTML = list.map((u, i) => `
            <article class="chalk-card update-entry reveal ${DELAYS[i % DELAYS.length]}">
              <div class="meta">
                <span class="version">${escapeHtml(u.version || '')}</span>
                <span class="date">${escapeHtml(fmtDate(u.date || ''))}</span>
                ${u.tagline ? `<span class="muted">— ${escapeHtml(u.tagline)}</span>` : ''}
              </div>
              <h2 class="${TILT[i % TILT.length]}">${escapeHtml(u.title || '')}</h2>
              ${Array.isArray(u.items) && u.items.length
                ? `<ul>${u.items.map(it => `<li>${inlineFormat(it)}</li>`).join('')}</ul>`
                : ''}
            </article>
          `).join('');
          // Re-apply scroll reveal to the freshly-injected cards
          if (window.HereditaApp && typeof window.HereditaApp.rewireReveal === 'function') {
            window.HereditaApp.rewireReveal();
          } else {
            // Fallback: just unhide them
            container.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
          }
        } catch (err) {
          console.error('[updates] failed to load', err);
          container.innerHTML = `
            <article class="chalk-card update-entry">
              <h2 class="tilt-l">Couldn't load patch notes</h2>
              <p class="muted">${escapeHtml(err.message || 'Unknown error')}. Try a hard refresh.</p>
            </article>`;
        }
      }
      document.addEventListener('DOMContentLoaded', loadUpdates);
    })();
  </script>
</body>
