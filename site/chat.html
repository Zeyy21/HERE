<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heredita — Chat</title>
  <link rel="icon" href="assets/heredita-icon.webp" type="image/webp" />
  <link rel="stylesheet" href="css/chalkboard.css" />
</head>
<body>

  <header class="topbar">
    <div class="inner">
      <div class="topbar-left">
        <a class="brand" href="play.html" aria-label="Heredita — Play">
          <img src="assets/heredita-icon.webp" alt="" />
          <span class="brand-name">Heredita</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation">Menu</button>
        <nav aria-label="Primary" data-social-host>
          <a href="home.html">Home</a>
          <a href="play.html">Play</a>
          <a href="store.html">Store</a>
          <a href="avatar.html">Avatar</a>
          <a href="updates.html">Updates</a>
          <a href="about.html">About</a>
        </nav>
      </div>
      <div class="topbar-right">
        <div class="coin-chip" title="In-game currency — coming soon">
          <span class="coin" aria-hidden="true"></span>
          <span>0</span>
          <span class="soon">coming soon</span>
        </div>
        <div class="user-chip">
          <span class="avatar">G</span>
          <div class="user-block">
            <span class="name">Guest</span>
            <a href="membership.html" class="tier-badge" data-tier="guest">Guest</a>
          </div>
        </div>
        <a class="btn-icon" href="settings.html" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top: 22px;">
    <div class="section-title reveal">
      <h1 class="tilt-l">Community Chat</h1>
      <span class="muted">real-time, free, no download</span>
    </div>

    <div id="chatRoot" aria-live="polite">
      <p class="muted text-center" style="padding: 30px 0;">Loading chat…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="about.html">About Us</a>
        <a href="terms.html">Terms &amp; Conditions</a>
        <a href="updates.html">Updates</a>
      </div>
      <div class="footer-meta">© 2026 Heredita — <span class="muted">heredita.net</span></div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/social-nav.js"></script>
  <script src="js/chat-config.js"></script>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
