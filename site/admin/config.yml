# Decap CMS configuration for Heredita.
#
# Backend = Netlify Git Gateway. Decap auths via Netlify Identity (no
# GitHub OAuth app to register, no client_id to copy). Edits are committed
# back to the Zeyy21/HERE GitHub repo by the Git Gateway service.
#
# One-time setup (~2 minutes), using `netlify-cli`:
#   1.  npm install -g netlify-cli
#   2.  netlify login
#   3.  netlify init           (link to this folder; create a new Netlify site)
#   4.  netlify open:admin     (opens the dashboard)
#   5.  In the dashboard:
#       - Integrations → Identity → Enable Identity
#       - Identity → Services → Enable Git Gateway
#       - Identity → Invite users → invite your own email → accept invite
#   6.  Visit https://heredita.net/admin/ and sign in with that email.
#
# After that, every "Publish" in Decap commits to GitHub and triggers a
# Vercel rebuild, so updates appear on every visitor's next page load.

backend:
  name: git-gateway
  branch: main

# Where Decap writes media uploads (we don't use any yet, but it's required).
media_folder: "site/assets/uploads"
public_folder: "/assets/uploads"

site_url: https://heredita.net
display_url: https://heredita.net

publish_mode: simple

collections:
  - name: updates
    label: "Updates / Patch Notes"
    label_singular: "Patch note"
    description: >
      Edit the entries shown on /updates.html. Each entry becomes one
      chalkboard card on the page. Newest goes on top.
    files:
      - name: updates_file
        label: "All patch notes"
        file: "site/content/updates.json"
        format: "json"
        fields:
          - name: updates
            label: "Patch notes"
            label_singular: "patch note"
            widget: list
            allow_add: true
            collapsed: false
            summary: "{{fields.version}} — {{fields.title}}"
            fields:
              - { name: version,  label: "Version tag (e.g. v0.4)", widget: string }
              - { name: date,     label: "Date",                   widget: datetime, time_format: false, date_format: "YYYY-MM-DD", picker_utc: false }
              - { name: tagline,  label: "Tagline (short suffix)",  widget: string, required: false }
              - { name: title,    label: "Headline",               widget: string }
              # Each bullet is a plain string in updates.json.
              - name: items
                label: "Bullet list"
                widget: list
                allow_add: true
                field: { name: bullet, label: "Bullet (use **bold** for emphasis)", widget: text }
