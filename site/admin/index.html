<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Heredita — Admin</title>
  <link rel="icon" href="../assets/heredita-icon.webp" type="image/webp" />

  <!-- Tell Decap to load its config from an ABSOLUTE path. Without this,
       Decap loads `./config.yml`, which fails when Vercel's cleanUrls strips
       /admin/ → /admin (so `./config.yml` resolves to /config.yml → 404). -->
  <link rel="cms-config-url" type="text/yaml" href="/admin/config.yml" />
</head>
<body>
  <!--
    Decap CMS admin.
    - Reads schema from /admin/config.yml (absolute path; see <link> above)
    - Uses Netlify Identity widget for sign-in (free, no GitHub OAuth app needed)
    - Uses Git Gateway to commit content changes to Zeyy21/HERE on GitHub
    Unlinked from the rest of the site; bookmark /admin/ to reach it.
  -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
