# Netlify config for Heredita.
#
# Heredita is hosted on Vercel — Netlify is used ONLY as a free host for
# the Identity + Git Gateway services that Decap CMS authenticates against.
# Netlify never serves the live pages.
#
# We deliberately disable builds + deploys on this Netlify project so it
# doesn't ship a duplicate copy of the site or run any build command.

[build]
  publish  = "site"
  # No build step. Leave blank so Netlify just no-ops.
  command  = "echo 'No build — Netlify hosts only the Identity service'"

[build.processing]
  skip_processing = true

# Identity + Git Gateway are enabled per-site in the Netlify dashboard.
# See site/admin/config.yml for the exact steps.
